<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Socios</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f4f4;
}

header{
    background:#0B4F6C;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    margin-top:30px;
}

table{
    margin-top:20px;
}

.btn{
    margin:2px;
}
</style>

</head>
<body>

<header>
<h2>Gestión de Socios</h2>
</header>

<div class="container">

<div class="card shadow p-4">

<h4>Registrar Nuevo Socio</h4>

<form id="formSocio">

<div class="row">

<div class="col-md-4">
<label>Cédula</label>
<input type="text" id="cedula" class="form-control" required>
</div>

<div class="col-md-4">
<label>Nombre</label>
<input type="text" id="nombre" class="form-control" required>
</div>

<div class="col-md-4">
<label>Apellido</label>
<input type="text" id="apellido" class="form-control" required>
</div>

</div>

<div class="row mt-3">

<div class="col-md-6">
<label>Teléfono</label>
<input type="text" id="telefono" class="form-control">
</div>

<div class="col-md-6">
<label>Dirección</label>
<input type="text" id="direccion" class="form-control">
</div>

</div>

<div class="mt-4">

<button class="btn btn-success">
Guardar Socio
</button>

<a href="index.html" class="btn btn-secondary">
Volver
</a>

</div>

</form>

</div>

<div class="card mt-4 shadow">

<div class="card-body">

<h4>Lista de Socios</h4>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Cédula</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Teléfono</th>
<th>Dirección</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaSocios">

</tbody>

</table>

</div>

</div>

</div>

<script>

let socios=[];

const formulario=document.getElementById("formSocio");

formulario.addEventListener("submit",function(e){

e.preventDefault();

let socio={

cedula:cedula.value,
nombre:nombre.value,
apellido:apellido.value,
telefono:telefono.value,
direccion:direccion.value

};

socios.push(socio);

mostrarSocios();

formulario.reset();

});

function mostrarSocios(){

let tabla=document.getElementById("tablaSocios");

tabla.innerHTML="";

socios.forEach((socio,index)=>{

tabla.innerHTML+=`

<tr>

<td>${socio.cedula}</td>

<td>${socio.nombre}</td>

<td>${socio.apellido}</td>

<td>${socio.telefono}</td>

<td>${socio.direccion}</td>

<td>

<button class="btn btn-danger btn-sm" onclick="eliminar(${index})">

Eliminar

</button>

</td>

</tr>

`;

});

}

function eliminar(i){

socios.splice(i,1);

mostrarSocios();

}

</script>

</body>
</html>
