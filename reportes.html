<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

header{
    background:#0B4F6C;
    color:white;
    padding:20px;
    text-align:center;
}

.card{
    text-align:center;
    margin-top:20px;
}
</style>

</head>

<body>

<header>

<h2>Reportes de la Cooperativa</h2>

</header>

<div class="container">

<div class="row">

<div class="col-md-3">
<div class="card shadow p-3">
<h4>👥 Socios</h4>
<h2 id="socios">20</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>💰 Depósitos</h4>
<h2 id="depositos">$12000</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>💸 Retiros</h4>
<h2 id="retiros">$4500</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow p-3">
<h4>🏦 Saldo</h4>
<h2 id="saldo">$7500</h2>
</div>
</div>

</div>

<div class="card mt-4 shadow">

<div class="card-body">

<h3>Resumen General</h3>

<table class="table table-bordered">

<tr>
<th>Total de Socios</th>
<td id="rSocios">20</td>
</tr>

<tr>
<th>Total Depositado</th>
<td id="rDepositos">$12000</td>
</tr>

<tr>
<th>Total Retirado</th>
<td id="rRetiros">$4500</td>
</tr>

<tr>
<th>Saldo Disponible</th>
<td id="rSaldo">$7500</td>
</tr>

</table>

<a href="index.html" class="btn btn-primary">
Volver al Inicio
</a>

</div>

</div>

</div>

</body>
</html>
