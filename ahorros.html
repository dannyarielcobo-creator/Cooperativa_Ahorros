<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Ahorros</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
header{
    background:#0B4F6C;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    margin-top:30px;
}
</style>

</head>
<body>

<header>
<h2>Gestión de Ahorros</h2>
</header>

<div class="container">

<div class="card p-4 shadow">

<h4>Registrar Movimiento</h4>

<form id="formMovimiento">

<div class="mb-3">
<label>Nombre del Socio</label>
<input type="text" id="socio" class="form-control" required>
</div>

<div class="mb-3">
<label>Tipo</label>
<select id="tipo" class="form-select">
<option>Depósito</option>
<option>Retiro</option>
</select>
</div>

<div class="mb-3">
<label>Monto</label>
<input type="number" id="monto" class="form-control" required>
</div>

<button class="btn btn-success">Guardar</button>

<a href="index.html" class="btn btn-secondary">Volver</a>

</form>

</div>

<div class="card mt-4 shadow">

<div class="card-body">

<h4>Historial</h4>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Socio</th>
<th>Tipo</th>
<th>Monto</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

<h3 class="text-primary">
Saldo General: $ <span id="saldo">0</span>
</h3>

</div>

</div>

</div>

<script>

let movimientos=[];
let saldo=0;

document.getElementById("formMovimiento").addEventListener("submit",function(e){

e.preventDefault();

let socio=document.getElementById("socio").value;
let tipo=document.getElementById("tipo").value;
let monto=parseFloat(document.getElementById("monto").value);

if(tipo=="Depósito"){
saldo+=monto;
}else{
saldo-=monto;
}

movimientos.push({
socio,
tipo,
monto
});

mostrar();

this.reset();

});

function mostrar(){

let tabla=document.getElementById("tabla");

tabla.innerHTML="";

movimientos.forEach(m=>{

tabla.innerHTML+=`

<tr>

<td>${m.socio}</td>

<td>${m.tipo}</td>

<td>$${m.monto}</td>

</tr>

`;

});

document.getElementById("saldo").innerHTML=saldo;

}

</script>

</body>
</html>
